app = "pcifras-music"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  DATA_DIR = "/data"
  DB_PATH = "/data/app.db"
  TRIAL_DAYS = "7"
  SUBSCRIPTION_PRICE_BRL = "24.90"
  DOMAIN = "https://pcifras-music.fly.dev"
  BACK_URL = "https://pcifras-music.fly.dev/?pagamento=retorno"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[mounts]
  source = "pcifras_music_data"
  destination = "/data"
