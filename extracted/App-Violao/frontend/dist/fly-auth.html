<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autenticação Fly.io</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c0c14;
      color: #eeeef8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a44;
      border-radius: 16px;
      padding: 32px;
      max-width: 500px;
      text-align: center;
    }
    h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #7c6df0, #f06d8a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p { font-size: 0.9rem; color: #8888b0; line-height: 1.6; margin-bottom: 20px; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: linear-gradient(135deg, #7c6df0, #f06d8a);
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
    }
    .url {
      margin-top: 16px;
      font-size: 0.8rem;
      color: #5c5c7a;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Autenticação Fly.io</h2>
    <p>Clique no botão abaixo para autenticar no Fly.io no seu navegador.</p>
    <a href="https://fly.io/app/auth/cli/32636a7668633262616368747879697a616c7170746f7a696c36637837763468" target="_blank" rel="noopener">
      Autenticar no Fly.io
    </a>
    <div class="url">https://fly.io/app/auth/cli/32636a7668633262616368747879697a616c7170746f7a696c36637837763468</div>
  </div>
</body>
</html>
